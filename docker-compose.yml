services:
  postgres:
    image: postgres:16-alpine
    container_name: yassine-portfolio-db
    environment:
      POSTGRES_DB: yassine_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yassine_portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
